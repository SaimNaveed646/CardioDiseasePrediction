<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cardiovascular Risk Predictor</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1>❤️ Cardiovascular Risk Prediction</h1>
<p class="subtitle">Fill your health details to check cardiovascular risk</p>

<form id="predictionForm">

<div class="grid">

<div class="input-group">
<label>Full Name *</label>
<input type="text" id="name" required>
</div>

<div class="input-group">
<label>Age</label>
<input type="number" id="age" value="30">
</div>

<div class="input-group">
<label>Gender</label>
<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>
</div>

<div class="input-group">
<label>Height (meters)</label>
<input type="number" step="0.01" id="height" value="1.7">
</div>

<div class="input-group">
<label>Weight (kg)</label>
<input type="number" step="0.1" id="weight" value="70">
</div>

<div class="input-group">
<label>Systolic BP (ap_hi)</label>
<input type="number" id="ap_hi" value="120">
</div>

<div class="input-group">
<label>Diastolic BP (ap_lo)</label>
<input type="number" id="ap_lo" value="80">
</div>

<div class="input-group">
<label>Cholesterol</label>
<select id="cholesterol">
<option value="1">Normal</option>
<option value="2">Above Normal</option>
<option value="3">Well Above Normal</option>
</select>
</div>

<div class="input-group">
<label>Glucose</label>
<select id="gluc">
<option value="1">Normal</option>
<option value="2">Above Normal</option>
<option value="3">Well Above Normal</option>
</select>
</div>

<div class="input-group">
<label>Smoke</label>
<select id="smoke">
<option value="true">Yes</option>
<option value="false">No</option>
</select>
</div>

<div class="input-group">
<label>Alcohol</label>
<select id="alco">
<option value="true">Yes</option>
<option value="false">No</option>
</select>
</div>

<div class="input-group">
<label>Physically Active</label>
<select id="active">
<option value="true">Yes</option>
<option value="false">No</option>
</select>
</div>

</div>

<button type="submit" class="predict-btn">Predict Risk</button>

</form>

<div id="result"></div>

</div>

<script>

const API_URL = "/predict"

document.getElementById("predictionForm").addEventListener("submit", async function(e){

e.preventDefault()

const data = {

name: document.getElementById("name").value,
age: parseInt(document.getElementById("age").value),
gender: document.getElementById("gender").value,
height: parseFloat(document.getElementById("height").value),
weight: parseFloat(document.getElementById("weight").value),
ap_hi: parseInt(document.getElementById("ap_hi").value),
ap_lo: parseInt(document.getElementById("ap_lo").value),
cholesterol: parseInt(document.getElementById("cholesterol").value),
gluc: parseInt(document.getElementById("gluc").value),
smoke: document.getElementById("smoke").value === "true",
alco: document.getElementById("alco").value === "true",
active: document.getElementById("active").value === "true"

}

const response = await fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

const result = await response.json()

const resultDiv = document.getElementById("result")

let color = result.predicted_category == 0 ? "green" : "red"

resultDiv.innerHTML =
`<h2 style="color:${color}">Prediction Result for ${data.name}: ${result.predicted_category}</h2>`

})

</script>

</body>
</html>
